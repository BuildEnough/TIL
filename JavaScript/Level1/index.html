<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    <div class="alert-box" id="alert">
        <p id="title">알림창임</p>
        <button id="close">닫기</button>
    </div>
    
    <button onclick="아이디비밀번호알림창('아이디를 입력해주세요')">버튼1</button>
    <button onclick="아이디비밀번호알림창('비밀번호를 입력해주세요')">버튼2</button>
    
    <script>

        document.querySelector('#close').addEventListener('click', function(){
            document.querySelector('#alert').style.display = 'none';
        });

        function 알림창열기(구멍){
            document.querySelector('#alert').style.display = 구멍;
        }

        function 아이디비밀번호알림창(param) {
            // 1. p태그 내용바꾸기
            document.querySelector('#title').innerHTML = param;
            // 2. 띄우기
            document.querySelector('#alert').style.display = 'block';
        }


    </script>

</body>
</html>
